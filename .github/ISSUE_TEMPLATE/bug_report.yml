name: Bug Report
description: Report something that isn't working as expected
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include as much detail as you can.

  - type: input
    id: version
    attributes:
      label: Worker version
      description: From the dashboard footer, package.json, or latest GitHub release
      placeholder: '0.1.7'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Deploy worker with ...
        2. Send myQ notification email ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Output from `wrangler tail`, browser console, or the simulator tab
      render: shell
