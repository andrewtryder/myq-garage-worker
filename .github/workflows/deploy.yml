name: Deploy Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Version and Commit Message
        id: info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          COMMIT_MSG=$(git log -1 --pretty=%B | tr '\r\n' ' ' | tr '\n' ' ' | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Inject KV namespace ID
        if: vars.KV_NAMESPACE_ID != ''
        run: |
          sed -i 's/<YOUR_KV_NAMESPACE_ID>/${{ vars.KV_NAMESPACE_ID }}/g' wrangler.jsonc

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            API_KEY
          command: deploy --minify --tag "v${{ steps.info.outputs.version }}" --message "${{ steps.info.outputs.commit_msg }}" --var GARAGE_DOORS:'${{ secrets.GARAGE_DOORS }}'
        env:
          API_KEY: ${{ secrets.API_KEY }}
